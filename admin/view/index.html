<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý sản phẩm</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-blue-600 border-gray-200">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <div class="flex items-center space-x-8">
        <a href="#" class="text-white text-xl font-semibold tracking-wide">Navbar</a>
        <div class="hidden w-full md:block md:w-auto" id="navbar-default">
          <ul
            class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg md:flex-row md:space-x-6 md:mt-0 md:border-0">
            <li>
              <a href="#" class="block py-2 px-3 text-white bg-blue-700 rounded md:bg-transparent md:p-0"
                aria-current="page">Home</a>
            </li>
            <li>
              <a href="#" class="block py-2 px-3 text-blue-200 hover:text-white md:p-0">Link</a>
            </li>
            <li>
              <!-- Dropdown Menu -->
              <button id="dropdownNavbarLink" data-dropdown-toggle="dropdownNavbar"
                class="flex items-center justify-between w-full py-2 px-3 text-blue-200 hover:text-white md:p-0 md:w-auto">
                Dropdown
                <svg class="w-2.5 height-2.5 ms-2.5" aria-hidden="true" xmlns="http://w3.org" fill="none"
                  viewBox="0 0 100 10">
                  <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="m1 1 4 4 4-4" />
                </svg>
              </button>
              <div id="dropdownNavbar"
                class="z-10 hidden font-normal bg-white divide-y divide-gray-100 rounded-lg shadow w-44">
                <ul class="py-2 text-sm text-gray-700" aria-labelledby="dropdownLargeButton">
                  <li><a href="#" class="block px-4 py-2 hover:bg-gray-100">Action 1</a></li>
                  <li><a href="#" class="block px-4 py-2 hover:bg-gray-100">Action 2</a></li>
                </ul>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <!-- Content Container -->
  <div class="max-w-screen-xl mx-auto px-4 py-8">

    <!-- 2. Tiêu đề chính -->
    <h1 class="text-4xl font-light text-gray-700 mb-6">QUẢN LÝ SẢN PHẨM</h1>

    <!-- 3. Khu vực bảng quản lý -->
    <div class="bg-white border border-gray-200 rounded-lg shadow-sm">

      <!-- Tab Tiêu đề -->
      <div class="border-b border-gray-200 bg-gray-50 px-4 py-3 rounded-t-lg">
        <span class="text-sm font-medium text-gray-600">Danh sách sản phẩm</span>
      </div>

      <!-- Thanh công cụ (Nút thêm và Ô tìm kiếm) -->
      <div class="flex flex-col md:flex-row items-center justify-between space-y-3 md:space-y-0 md:space-x-4 p-4">
        <!-- Nút Thêm Mới -->
        <button id="btnThemSP" type="button" data-modal-target="product-modal" data-modal-toggle="product-modal"
          class="flex items-center justify-center text-white bg-green-600 hover:bg-green-700 font-medium rounded-lg text-sm px-4 py-2">
          <svg class="h-3.5 w-3.5 mr-2" fill="currentColor" viewbox="0 0 20 20" xmlns="http://w3.org"
            aria-hidden="true">
            <path clip-rule="evenodd" fill-rule="evenodd"
              d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" />
          </svg>
          Thêm Mới
        </button>

        <!-- Thanh tìm kiếm -->
        <div class="w-full md:w-80">
          <form class="flex items-center">
            <div class="relative w-full">
              <input type="text" id="simple-search"
                class="bg-white border border-gray-300 text-gray-900 text-sm rounded-l-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2"
                placeholder="Nhập từ khóa" required="">
            </div>
            <button type="submit"
              class="p-2 text-sm font-medium text-gray-700 bg-gray-100 border border-l-0 border-gray-300 rounded-r-lg hover:bg-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://w3.org">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
              <span class="sr-only">Tìm kiếm</span>
            </button>
          </form>
        </div>
      </div>

      <!-- 4. Bảng dữ liệu (Table) -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left text-gray-500">
          <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-t border-b border-gray-200">
            <tr>
              <th scope="col" class="px-4 py-3 w-16">STT</th>
              <th scope="col" class="px-4 py-3">Tên Sản Phẩm</th>
              <th scope="col" class="px-4 py-3">Giá</th>
              <th scope="col" class="px-4 py-3">Màn Hình</th>
              <th scope="col" class="px-4 py-3">Camera Sau</th>
              <th scope="col" class="px-4 py-3">Camera Trước</th>
              <th scope="col" class="px-4 py-3">Hình Ảnh</th>
              <th scope="col" class="px-4 py-3">Mô Tả</th>
              <th scope="col" class="px-4 py-3">Hãng</th>
              <th scope="col" class="px-4 py-3 w-32">Số lượng</th>
              <th scope="col" class="px-4 py-3 w-32">Action</th>
            </tr>
          </thead>
          <tbody id="tblDanhSachSP">
            <!-- Dòng dữ liệu trống sẵn sàng để đổ dữ liệu từ JS/Axios -->
           
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Modal Thêm Sản Phẩm -->
  <div id="product-modal" tabindex="-1" aria-hidden="true"
    class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">

    <div class="relative p-4 w-full max-w-3xl max-h-full">

      <!-- Modal content -->
      <div class="relative bg-white rounded-lg shadow">

        <!-- Header -->
        <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t">
          <h3 id="modal-title" class="text-2xl font-semibold text-gray-900">
            Modal Heading
          </h3>

          <button type="button"
            class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center"
            data-modal-hide="product-modal">
            <svg class="w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="m1 1 12 12M13 1 1 13" />
            </svg>
          </button>
        </div>

        <!-- Body -->
        <form id="productForm" class="p-4 md:p-5">

          <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">
              Tên sản phẩm
            </label>
            <input type="text" id="tenSP"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
              placeholder="Nhập vào tên sản phẩm">
          </div>

          <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">
              Giá
            </label>
            <input type="number" id="giaSP"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
              placeholder="Nhập vào giá">
          </div>

          <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">
              Hình ảnh
            </label>
            <input type="text" id="hinhAnh"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
              placeholder="Nhập vào hình sản phẩm">
          </div>

          <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-900">
              Mô tả
            </label>
            <textarea id="moTa" rows="4"
              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500"
              placeholder="Nhập mô tả sản phẩm"></textarea>
          </div>

      </div>

      </form>

    </div>

  </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>

  <!-- Axios CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
    integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="./../controller/main.js"></script>
</body>

</html>
